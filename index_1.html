<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>관리비 장부</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css">
<style>
:root{
  --paper:#F2F5EF;
  --card:#FFFFFF;
  --ink:#1E2922;
  --ink-soft:#62705F;
  --rule:#DFE6DA;
  --ledger:#175A40;
  --ledger-deep:#0E4530;
  --income:#1D5FA8;
  --expense:#C2402F;
  --chip:#EAF1E7;
  --nav-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"Pretendard","Pretendard Variable","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased;
}
.num{font-variant-numeric:tabular-nums}
.shell{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  background:var(--paper);box-shadow:0 0 40px rgba(20,40,30,.06)}

/* ── 상단 고정 헤더 ── */
.topbar{position:sticky;top:0;z-index:20;background:var(--ledger);color:#fff;
  padding:14px 18px 12px;border-radius:0 0 18px 18px}
.topbar .row1{display:flex;align-items:center;justify-content:space-between}
.topbar .bname{font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:6px}
.topbar .bname small{font-weight:600;font-size:.68rem;color:rgba(255,255,255,.65);letter-spacing:.25em}
.month-nav{display:flex;align-items:center;justify-content:center;gap:2px;margin-top:8px}
.month-nav button{border:none;background:rgba(255,255,255,.14);color:#fff;font-size:1rem;
  width:42px;height:42px;border-radius:12px;cursor:pointer}
.month-nav button:active{background:rgba(255,255,255,.3)}
.month-nav .label{font-weight:800;font-size:1.12rem;min-width:130px;text-align:center}

/* ── 본문 ── */
main{flex:1;padding:16px 16px calc(var(--nav-h) + 28px + env(safe-area-inset-bottom))}
.page{display:none}
.page.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── 잔액 카드 (시그니처) ── */
.balance-card{background:linear-gradient(150deg,var(--ledger) 0%,var(--ledger-deep) 100%);
  color:#fff;border-radius:18px;padding:20px;position:relative;overflow:hidden;margin-bottom:12px}
.balance-card .k{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.72)}
.balance-card .v{font-size:2rem;font-weight:800;letter-spacing:-.01em;margin:2px 0 12px}
.balance-card .flow{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.18);padding-top:12px}
.balance-card .flow div{flex:1}
.balance-card .flow .fk{font-size:.68rem;color:rgba(255,255,255,.62);font-weight:700}
.balance-card .flow .fv{font-size:.95rem;font-weight:800;white-space:nowrap}
.stamp{position:absolute;right:16px;top:16px;transform:rotate(-12deg);
  width:54px;height:54px;border:2.5px solid rgba(255,255,255,.55);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.76rem;
  color:rgba(255,255,255,.75);letter-spacing:.12em;pointer-events:none}

/* ── 카드 섹션 ── */
.card{background:var(--card);border:1px solid var(--rule);border-radius:16px;padding:18px 16px;margin-bottom:12px}
.card h2{font-size:1rem;font-weight:800;display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:12px}
.card h2 .meta{font-size:.78rem;font-weight:700;color:var(--ink-soft)}
.note{font-size:.76rem;color:var(--ink-soft);margin-top:10px;line-height:1.5}

/* ── 납부 현황 ── */
.units{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.unit{border:1.5px solid var(--rule);border-radius:13px;padding:13px 6px;text-align:center;cursor:pointer;
  background:#fff;user-select:none;min-height:64px;transition:background .15s,border-color .15s}
.unit:active{transform:scale(.97)}
.unit .ho{font-weight:800;font-size:1rem}
.unit .st{font-size:.7rem;font-weight:700;color:var(--ink-soft);margin-top:2px}
.unit.ro{cursor:default}
.unit.ro:active{transform:none}
.unit.paid{background:var(--ledger);border-color:var(--ledger);color:#fff}
.unit.paid .st{color:rgba(255,255,255,.85)}
.pay-bar{height:9px;background:var(--chip);border-radius:99px;margin-top:14px;overflow:hidden}
.pay-bar i{display:block;height:100%;background:var(--ledger);border-radius:99px;transition:width .25s ease}

/* ── 내역 리스트 (모바일 친화: 표 대신 행 카드) ── */
.entry{display:flex;align-items:center;gap:12px;padding:13px 2px;border-bottom:1px solid var(--rule)}
.entry:last-child{border-bottom:none}
.entry .date{font-size:.74rem;font-weight:700;color:var(--ink-soft);width:44px;flex:none}
.entry .body{flex:1;min-width:0}
.entry .name{font-weight:700;font-size:.93rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry .pill{font-size:.66rem;font-weight:800;border-radius:5px;padding:1px 6px;display:inline-block;margin-top:1px}
.entry .pill.in{background:#E8F0FA;color:var(--income)}
.entry .pill.out{background:#FBEAE7;color:var(--expense)}
.entry .amt{font-weight:800;font-size:.95rem;white-space:nowrap}
.entry .amt.in{color:var(--income)} .entry .amt.out{color:var(--expense)}
.entry .del{border:none;background:none;color:#C2CBC2;font-size:1.05rem;padding:8px 4px;cursor:pointer}
.entry .del:active{color:var(--expense)}
.empty{padding:26px 8px;text-align:center;color:var(--ink-soft);font-size:.86rem}

/* ── 입력 폼 ── */
input,select,textarea,button{font-family:inherit;font-size:.95rem;color:var(--ink)}
.field{margin-bottom:10px}
.field label{display:block;font-size:.74rem;font-weight:700;color:var(--ink-soft);margin-bottom:4px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;border:1.5px solid var(--rule);border-radius:11px;padding:12px;background:#fff;min-height:46px}
textarea{min-height:110px;resize:vertical;line-height:1.5;font-size:.84rem}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ledger);outline-offset:1px;border-color:var(--ledger)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
button.primary{background:var(--ledger);color:#fff;border:none;border-radius:12px;
  padding:13px 18px;font-weight:800;font-size:.95rem;cursor:pointer;width:100%;min-height:48px}
button.primary:active{filter:brightness(1.12)}
button.primary:disabled{opacity:.45}
button.ghost{background:none;border:1.5px solid var(--rule);border-radius:12px;padding:11px 16px;
  font-weight:700;font-size:.86rem;cursor:pointer;color:var(--ink-soft);min-height:46px}
button.ghost:active{border-color:var(--ledger);color:var(--ledger)}
.btn-row{display:flex;gap:8px}
.btn-row>*{flex:1}

/* ── 거래내역 가져오기 미리보기 ── */
.preview-row{border:1.5px solid var(--rule);border-radius:12px;padding:10px;margin-bottom:8px;background:#FBFCFA}
.preview-row .line1{display:flex;gap:8px;margin-bottom:8px}
.preview-row .line1 input[name=pdesc]{flex:1.4}
.preview-row .line1 input[name=pamt]{flex:1;text-align:right}
.preview-row select{background:var(--chip);border-color:transparent;font-weight:700}
.preview-row.skip{opacity:.45}
.match-hint{font-size:.68rem;font-weight:700;color:var(--ledger);margin-top:4px}

/* ── 설정 ── */
.payer-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:8px;align-items:center}
.payer-grid .uno{font-weight:800;font-size:.9rem;padding-left:4px}

/* ── 하단 탭 ── */
nav.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-top:1px solid var(--rule);
  display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav.tabbar button{flex:1;border:none;background:none;height:var(--nav-h);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-size:.7rem;font-weight:700;color:var(--ink-soft)}
nav.tabbar button .ico{font-size:1.25rem;line-height:1}
nav.tabbar button.on{color:var(--ledger)}
nav.tabbar button.on .ico{transform:translateY(-1px)}

.toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:11px 20px;
  border-radius:99px;font-size:.85rem;font-weight:700;opacity:0;transition:all .25s ease;
  pointer-events:none;z-index:50;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:80px 0;color:var(--ink-soft);font-weight:700}
.hidden{display:none!important}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="row1">
      <div class="bname"><span id="bname">우리 건물</span> <small>관리비 장부</small></div>
      <button class="ghost" id="renameBtn" style="border-color:rgba(255,255,255,.3);color:#fff;min-height:34px;padding:5px 12px;font-size:.74rem">이름 수정</button>
    </div>
    <div class="month-nav">
      <button id="prevM" aria-label="이전 달">◀</button>
      <div class="label num" id="monthLabel">—</div>
      <button id="nextM" aria-label="다음 달">▶</button>
    </div>
  </div>

  <main>
    <div id="app" class="loading">장부를 펼치는 중…</div>
  </main>

  <nav class="tabbar">
    <button data-tab="home" class="on"><span class="ico">🏠</span>현황</button>
    <button data-tab="ledger"><span class="ico">📒</span>내역</button>
    <button data-tab="import"><span class="ico">🏦</span>입금확인</button>
    <button data-tab="settings"><span class="ico">⚙️</span>설정</button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ════════════════════════════════════════════════
   ① 여기에 Firebase 설정을 붙여넣으세요
   (Firebase 콘솔 > 프로젝트 설정 > 내 앱 > SDK 설정의
    firebaseConfig = { ... } 안쪽 내용을 그대로)
   ════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyBv10MnKvyGtA2f8XkdMSYQdNqqfEQa4Yw",
  authDomain: "lifeline-41c22.firebaseapp.com",
  projectId: "lifeline-41c22",
  storageBucket: "lifeline-41c22.firebasestorage.app",
  messagingSenderId: "610685213266",
  appId: "1:610685213266:web:a225401b0213bd0941dd8b"
};
/* ════════════════════════════════════════════════ */

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const fmt = n => (n<0?'-':'') + Math.abs(Math.round(n)).toLocaleString('ko-KR') + '원';
const DEFAULT_UNITS = ['101호','102호','103호','104호','201호','202호','203호','204호','301호','302호','303호','304호'].map(no=>({no, payer:''}));

const configured = !JSON.stringify(firebaseConfig).includes('여기에');
let db=null, auth=null, ledgerRef=null;
let data=null, tab='home', parsed=[], isAdmin=false, ready=false;
const now = new Date();
let cur = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

function blank(){ return { settings:{ buildingName:'우리 건물', monthlyFee:50000, initialBalance:0, units:JSON.parse(JSON.stringify(DEFAULT_UNITS)) }, months:{} }; }
function migrate(d){
  if(d && d.settings && d.settings.units && typeof d.settings.units[0] === 'string')
    d.settings.units = d.settings.units.map(no=>({no, payer:''}));
  return d;
}
function monthData(m){ if(!data.months[m]) data.months[m] = { payments:{}, entries:[] }; return data.months[m]; }
function netOf(md){
  const pay = Object.values(md.payments||{}).reduce((a,b)=>a+(+b||0),0);
  let inc = pay, out = 0;
  (md.entries||[]).forEach(e=> e.type==='in' ? inc += +e.amount : out += +e.amount);
  return { income:inc, expense:out, net:inc-out };
}
function carryBefore(m){
  let c = +data.settings.initialBalance || 0;
  Object.keys(data.months).filter(k=>k<m).forEach(k=> c += netOf(data.months[k]).net);
  return c;
}
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1900); }
function denied(){ toast('관리자만 수정할 수 있어요'); }
async function save(){
  try{ await setDoc(ledgerRef, data); }
  catch(e){ console.error(e); toast(e.code==='permission-denied' ? '권한이 없어요 — 관리자 로그인이 필요합니다' : '저장 실패 — 인터넷 연결을 확인해 주세요'); }
}
function monthLabel(m){ const [y,mm]=m.split('-'); return `${y}년 ${+mm}월`; }
function shiftMonth(d){ const [y,m]=cur.split('-').map(Number); const dt=new Date(y, m-1+d, 1); cur=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; parsed=[]; render(); }
function setTab(t){ tab=t; $$('.tabbar button').forEach(b=>b.classList.toggle('on', b.dataset.tab===t)); $$('.page').forEach(p=>p.classList.toggle('active', p.id==='pg-'+t)); window.scrollTo({top:0}); }

/* ── 거래내역 파싱 ── */
function parseBankText(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l && !/^(거래일|일자|날짜|구분|적요|내용|입금|출금|잔액)/.test(l));
  const out = [];
  for(const line of lines){
    let date = cur + '-01';
    const d1 = line.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
    const d2 = line.match(/\b(\d{1,2})[./](\d{1,2})\b/);
    if(d1) date = `${d1[1]}-${d1[2].padStart(2,'0')}-${d1[3].padStart(2,'0')}`;
    else if(d2) date = `${cur.slice(0,4)}-${d2[1].padStart(2,'0')}-${d2[2].padStart(2,'0')}`;
    const work = line
      .replace(/\d{4}[-./]\d{1,2}[-./]\d{1,2}/g,' ')
      .replace(/\b\d{1,2}[./]\d{1,2}\b/g,' ')
      .replace(/\d{1,2}:\d{2}(:\d{2})?/g,' ');
    const commaAmts = (work.match(/\d{1,3}(?:,\d{3})+/g) || []).map(a=>+a.replace(/,/g,''));
    const plainAmts = (work.match(/\b\d{4,9}\b/g) || []).map(Number);
    const amounts = commaAmts.length ? commaAmts : plainAmts;
    if(!amounts.length) continue;
    const amount = amounts.find(a=>a>=1000) ?? amounts[0];
    let desc = work
      .replace(/\d{1,3}(?:,\d{3})+/g,' ')
      .replace(/\b\d{4,9}\b/g,' ')
      .replace(/(입금|출금|이체|전자금융|타행|당행|원)/g,' ')
      .replace(/[\t,|]+/g,' ').replace(/\s+/g,' ').trim().slice(0,24);
    let match = '';
    for(const u of data.settings.units){
      const numOnly = u.no.replace(/[^0-9]/g,'');
      if((u.payer && desc.includes(u.payer)) || (numOnly && desc.includes(numOnly))){ match = u.no; break; }
    }
    out.push({ date, desc: desc || '입금', amount, assign: match ? 'unit:'+match : 'in', matched: !!match });
  }
  return out;
}

/* ── 렌더 ── */
function render(){
  if(!configured){
    $('#app').className='';
    $('#app').innerHTML = `<div class="card"><h2>마지막 설정이 1단계 남았어요</h2>
      <div class="note" style="margin:0">이 파일(index.html)을 메모장으로 열어 위쪽의 <b>firebaseConfig</b> 부분에 Firebase 콘솔에서 복사한 설정값을 붙여넣은 뒤, GitHub에 다시 업로드해 주세요. 자세한 순서는 안내를 따라 진행하면 됩니다.</div></div>`;
    return;
  }
  if(!ready){ return; }
  $('#bname').textContent = data.settings.buildingName;
  $('#monthLabel').textContent = monthLabel(cur);
  $('#renameBtn').classList.toggle('hidden', !isAdmin);
  const md = monthData(cur), s = data.settings;
  const {income, expense, net} = netOf(md);
  const carry = carryBefore(cur), balance = carry + net;
  const paidCount = Object.keys(md.payments).length;
  const todayISO = new Date().toISOString().slice(0,10);
  const defDate = todayISO.startsWith(cur) ? todayISO : cur + '-01';

  const unitChips = s.units.map(u=>{
    const paid = md.payments[u.no] !== undefined;
    return `<div class="unit ${paid?'paid':''} ${isAdmin?'':'ro'}" ${isAdmin?'role="button" tabindex="0"':''} data-unit="${u.no}">
      <div class="ho">${u.no}</div><div class="st num">${paid?fmt(md.payments[u.no]):'미납'}</div></div>`;
  }).join('');

  const sorted = [...md.entries].sort((a,b)=> a.date===b.date ? a.id-b.id : (a.date<b.date?-1:1));
  const entryRows = sorted.map(e=>`
    <div class="entry">
      <div class="date num">${e.date.slice(5).replace('-','.')}</div>
      <div class="body"><div class="name">${e.name}</div><span class="pill ${e.type}">${e.type==='in'?'수입':'지출'}</span></div>
      <div class="amt num ${e.type}">${e.type==='in'?'+':'−'} ${fmt(e.amount)}</div>
      ${isAdmin?`<button class="del" data-del="${e.id}" title="삭제">✕</button>`:''}
    </div>`).join('');

  const previewRows = parsed.map((p,i)=>`
    <div class="preview-row ${p.assign==='skip'?'skip':''}" data-i="${i}">
      <div class="line1">
        <input type="text" name="pdesc" value="${p.desc.replace(/"/g,'&quot;')}" aria-label="내용">
        <input type="number" name="pamt" class="num" value="${p.amount}" min="0" aria-label="금액">
      </div>
      <select name="passign" aria-label="처리 방법">
        ${s.units.map(u=>`<option value="unit:${u.no}" ${p.assign==='unit:'+u.no?'selected':''}>${u.no} 관리비 납부</option>`).join('')}
        <option value="in" ${p.assign==='in'?'selected':''}>기타 수입으로 기록</option>
        <option value="skip" ${p.assign==='skip'?'selected':''}>건너뛰기</option>
      </select>
      ${p.matched?'<div class="match-hint">✓ 입금자명으로 자동 매칭됨</div>':''}
    </div>`).join('');

  const adminOnlyNote = `<div class="card"><h2>관리자 전용 기능</h2><div class="note" style="margin:0">이 기능은 관리자만 사용할 수 있어요. 설정 탭에서 로그인해 주세요. 입주민은 현황·내역 탭에서 실시간 장부를 확인할 수 있습니다.</div></div>`;

  $('#app').className='';
  $('#app').innerHTML = `
  <!-- 현황 -->
  <div class="page" id="pg-home">
    <div class="balance-card">
      <div class="k">${monthLabel(cur)} 말 잔액</div>
      <div class="v num">${fmt(balance)}</div>
      <div class="flow">
        <div><div class="fk">전월 이월</div><div class="fv num">${fmt(carry)}</div></div>
        <div><div class="fk">수입</div><div class="fv num" style="color:#A9D3FF">+${fmt(income)}</div></div>
        <div><div class="fk">지출</div><div class="fv num" style="color:#FFB9AC">−${fmt(expense)}</div></div>
      </div>
      <div class="stamp">확인</div>
    </div>
    <div class="card">
      <h2>관리비 납부 현황 <span class="meta num">${paidCount}/${s.units.length}가구</span></h2>
      <div class="units">${unitChips}</div>
      <div class="pay-bar"><i style="width:${s.units.length?(paidCount/s.units.length*100):0}%"></i></div>
      <div class="note">${isAdmin
        ? `호수를 누르면 납부 ↔ 미납이 바뀝니다 (가구당 ${fmt(s.monthlyFee)}/월).`
        : `가구당 관리비는 월 ${fmt(s.monthlyFee)}입니다. 기록은 관리자가 관리하며, 모든 입주민에게 실시간으로 공유됩니다.`}</div>
    </div>
  </div>

  <!-- 내역 -->
  <div class="page" id="pg-ledger">
    <div class="card">
      <h2>${monthLabel(cur)} 사용 내역 <span class="meta num">지출 ${fmt(expense)}</span></h2>
      ${sorted.length ? entryRows : '<div class="empty">이 달에는 아직 기록이 없어요.</div>'}
    </div>
    ${isAdmin?`
    <div class="card">
      <h2>기록 추가</h2>
      <form id="entryForm" class="form-grid">
        <div class="field"><label>날짜</label><input type="date" name="edate" value="${defDate}" required></div>
        <div class="field"><label>구분</label><select name="etype"><option value="out">지출</option><option value="in">수입</option></select></div>
        <div class="field full"><label>내용</label><input type="text" name="ename" placeholder="예: 공용 전기료" required maxlength="40"></div>
        <div class="field full"><label>금액 (원)</label><input type="number" name="eamount" placeholder="예: 35000" min="1" step="1" required inputmode="numeric"></div>
        <div class="full"><button class="primary" type="submit">장부에 기록</button></div>
      </form>
    </div>`:''}
  </div>

  <!-- 입금확인 -->
  <div class="page" id="pg-import">
    ${!isAdmin ? adminOnlyNote : `
    <div class="card">
      <h2>은행 거래내역으로 입금 확인</h2>
      <div class="note" style="margin:0 0 10px">공동통장(모임통장) 앱이나 인터넷뱅킹에서 <b>거래내역을 복사해서</b> 아래에 붙여넣으세요. 한 줄에 거래 1건이면 형식은 자유입니다.</div>
      <textarea id="bankText" placeholder="예)
06.02 김철수 50,000 입금
2026-06-03 이영희 50,000
06.05 302호박민수 50,000"></textarea>
      <div style="height:10px"></div>
      <button class="primary" id="parseBtn">내역 읽기</button>
    </div>
    <div class="card ${parsed.length?'':'hidden'}" id="previewCard">
      <h2>확인 후 적용 <span class="meta num">${parsed.length}건</span></h2>
      <div id="previewList">${previewRows}</div>
      <div class="btn-row" style="margin-top:6px">
        <button class="ghost" id="clearParse">취소</button>
        <button class="primary" id="applyParse">선택한 내역 적용</button>
      </div>
      <div class="note">설정 탭에서 호수별 <b>입금자명</b>을 등록해 두면 다음부터 자동으로 매칭됩니다.</div>
    </div>`}
  </div>

  <!-- 설정 -->
  <div class="page" id="pg-settings">
    <div class="card">
      <h2>관리자 ${isAdmin?'<span class="meta" style="color:var(--ledger)">로그인됨 ✓</span>':''}</h2>
      ${isAdmin ? `
        <div class="note" style="margin:0 0 10px">관리자로 로그인되어 있어 모든 기록·설정을 수정할 수 있습니다.</div>
        <button class="ghost" id="logoutBtn" style="width:100%">로그아웃</button>`
      : `
        <div class="note" style="margin:0 0 10px">장부 보기는 로그인 없이 누구나 가능해요. 기록을 수정하려면 관리자 계정으로 로그인하세요.</div>
        <form id="loginForm">
          <div class="field"><label>관리자 이메일</label><input type="email" name="lemail" autocomplete="username" required></div>
          <div class="field"><label>비밀번호</label><input type="password" name="lpw" autocomplete="current-password" required></div>
          <button class="primary" type="submit">관리자 로그인</button>
        </form>`}
    </div>
    ${isAdmin?`
    <div class="card">
      <h2>기본 설정</h2>
      <div class="field"><label>월 관리비 (가구당, 원)</label><input id="setFee" type="number" min="0" step="1000" value="${s.monthlyFee}"></div>
      <div class="field"><label>장부 시작 잔액 (원)</label><input id="setInit" type="number" step="1" value="${s.initialBalance}"></div>
      <div class="field"><label>호수 목록 (쉼표로 구분)</label><input id="setUnits" type="text" value="${s.units.map(u=>u.no).join(', ')}"></div>
    </div>
    <div class="card">
      <h2>호수별 입금자명</h2>
      <div class="note" style="margin:0 0 10px">통장에 찍히는 이름을 적어두면 입금확인 시 자동으로 해당 가구에 매칭됩니다.</div>
      <div class="payer-grid">
        ${s.units.map((u,i)=>`<div class="uno">${u.no}</div><input type="text" data-payer="${i}" value="${(u.payer||'').replace(/"/g,'&quot;')}" placeholder="예: 김철수">`).join('')}
      </div>
    </div>
    <div class="btn-row">
      <button class="ghost" id="resetAll">전체 초기화</button>
      <button class="primary" id="applySet">설정 저장</button>
    </div>`:''}
    <div class="note">이 장부는 실시간으로 동기화됩니다. 링크를 받은 입주민 모두가 같은 내용을 봅니다.</div>
  </div>`;

  setTab(tab);
  bindEvents(md);
}

function bindEvents(md){
  $$('.unit').forEach(el=>{
    const fn = async ()=>{
      if(!isAdmin){ denied(); return; }
      const u = el.dataset.unit;
      if(md.payments[u]!==undefined){ if(!confirm(`${u} 납부를 취소할까요?`)) return; delete md.payments[u]; }
      else md.payments[u] = +data.settings.monthlyFee;
      await save();
    };
    el.addEventListener('click', fn);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fn(); } });
  });

  const ef = $('#entryForm');
  if(ef) ef.addEventListener('submit', async e=>{
    e.preventDefault();
    const f = e.target, amount = +f.eamount.value, name = f.ename.value.trim();
    if(!name || !(amount>0)) return;
    md.entries.push({ id:Date.now()+Math.random(), date:f.edate.value, type:f.etype.value, name, amount });
    await save(); toast('기록했어요');
  });

  $$('[data-del]').forEach(b=> b.addEventListener('click', async ()=>{
    if(!confirm('이 기록을 삭제할까요?')) return;
    md.entries = md.entries.filter(e=> String(e.id)!==b.dataset.del);
    await save();
  }));

  const pb = $('#parseBtn');
  if(pb) pb.addEventListener('click', ()=>{
    const txt = $('#bankText').value;
    if(!txt.trim()){ toast('거래내역을 먼저 붙여넣어 주세요'); return; }
    parsed = parseBankText(txt);
    if(!parsed.length){ toast('금액을 찾지 못했어요 — 형식을 확인해 주세요'); return; }
    render(); setTab('import');
  });

  $$('#previewList .preview-row').forEach(row=>{
    const i = +row.dataset.i;
    row.querySelector('[name=pdesc]').addEventListener('input', e=> parsed[i].desc = e.target.value);
    row.querySelector('[name=pamt]').addEventListener('input', e=> parsed[i].amount = +e.target.value);
    row.querySelector('[name=passign]').addEventListener('change', e=>{
      parsed[i].assign = e.target.value;
      row.classList.toggle('skip', e.target.value==='skip');
    });
  });

  const clearBtn = $('#clearParse');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{ parsed=[]; render(); setTab('import'); });

  const applyBtn = $('#applyParse');
  if(applyBtn) applyBtn.addEventListener('click', async ()=>{
    let nPay=0, nIn=0;
    for(const p of parsed){
      if(p.assign==='skip' || !(p.amount>0)) continue;
      if(p.assign.startsWith('unit:')){ md.payments[p.assign.slice(5)] = p.amount; nPay++; }
      else { md.entries.push({ id:Date.now()+Math.random(), date:p.date, type:'in', name:p.desc||'입금', amount:p.amount }); nIn++; }
    }
    parsed=[];
    await save();
    toast(`납부 ${nPay}건, 기타 수입 ${nIn}건 처리했어요`); setTab('home');
  });

  const as = $('#applySet');
  if(as) as.addEventListener('click', async ()=>{
    const fee = +$('#setFee').value, init = +$('#setInit').value;
    const nos = $('#setUnits').value.split(',').map(x=>x.trim()).filter(Boolean);
    if(!nos.length){ toast('호수를 1개 이상 입력해 주세요'); return; }
    const payers = {}; data.settings.units.forEach(u=>payers[u.no]=u.payer);
    $$('[data-payer]').forEach(inp=>{ const u=data.settings.units[+inp.dataset.payer]; if(u) payers[u.no]=inp.value.trim(); });
    data.settings.monthlyFee = fee>=0?fee:0;
    data.settings.initialBalance = isNaN(init)?0:init;
    data.settings.units = nos.map(no=>({no, payer:payers[no]||''}));
    await save(); toast('설정을 저장했어요'); setTab('settings');
  });

  const ra = $('#resetAll');
  if(ra) ra.addEventListener('click', async ()=>{
    if(!confirm('모든 기록과 설정이 삭제됩니다. 정말 초기화할까요?')) return;
    data = blank(); parsed=[]; await save();
  });

  const lf = $('#loginForm');
  if(lf) lf.addEventListener('submit', async e=>{
    e.preventDefault();
    const f = e.target;
    try{ await signInWithEmailAndPassword(auth, f.lemail.value.trim(), f.lpw.value); toast('관리자로 로그인했어요'); }
    catch(err){ console.error(err); toast('로그인 실패 — 이메일/비밀번호를 확인해 주세요'); }
  });

  const lo = $('#logoutBtn');
  if(lo) lo.addEventListener('click', async ()=>{ await signOut(auth); toast('로그아웃했어요'); });
}

$('#prevM').addEventListener('click', ()=>shiftMonth(-1));
$('#nextM').addEventListener('click', ()=>shiftMonth(1));
$('#renameBtn').addEventListener('click', async ()=>{
  if(!isAdmin){ denied(); return; }
  const v = prompt('건물 이름을 입력하세요', data.settings.buildingName);
  if(v && v.trim()){ data.settings.buildingName = v.trim(); await save(); }
});
$$('.tabbar button').forEach(b=> b.addEventListener('click', ()=> setTab(b.dataset.tab)));

/* ── 시작 ── */
if(configured){
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  auth = getAuth(app);
  ledgerRef = doc(db, 'ledger', 'main');
  onAuthStateChanged(auth, u=>{ isAdmin = !!u; if(ready) render(); });
  onSnapshot(ledgerRef, snap=>{
    /* 입력 중 다른 변경이 와도 타이핑이 지워지지 않게 잠시 보류 */
    const ae = document.activeElement;
    const typing = ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA') && (ae.value||'').length>0;
    data = migrate(snap.exists() ? snap.data() : blank());
    ready = true;
    if(!typing) render();
  }, err=>{
    console.error(err);
    $('#app').className='';
    $('#app').innerHTML = '<div class="card"><h2>연결 실패</h2><div class="note" style="margin:0">데이터베이스에 연결하지 못했어요. Firebase 설정값과 Firestore 보안 규칙을 확인해 주세요.</div></div>';
  });
}else{
  render();
}
</script>
</body>
</html>
